<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Sakshi 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hearts"></div>

<!-- PAGE 1 -->
<div id="page1" class="page pink">
    <h1>✨ It's Your Special Day ✨</h1>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page pink hidden">
    <h2>Do you wanna see what I made? 💖</h2>
    <button onclick="goToPage(3)">YES 😍</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page hidden">
    <div class="popup">
        <p>👀 Have a look on it</p>
        <button onclick="goToPage(4)">Open</button>
    </div>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page black hidden">
    <button onclick="turnOnLight()">Turn On Light 💡</button>
</div>

<!-- MAIN -->
<div id="page5" class="page white hidden">

    <div id="controls">
        <button id="btnMusic" onclick="playMusic()">🎵 Play Music</button>
        <button id="btnDecor" class="hidden" onclick="decorate()">🎉 Decorate</button>
        <button id="btnCake" class="hidden" onclick="showCake()">🎂 Cut Cake</button>
    </div>

    <div id="decor"></div>

    <!-- CAKE -->
    <div id="cakeBox" class="hidden">
        <img id="cake" src="cake.png">
        <div id="cutLine"></div>
    </div>

</div>

<!-- LETTER -->
<div id="letter" class="hidden">
    <div class="envelope" onclick="openLetter()">
        💌 Click to open
    </div>
</div>

<!-- MESSAGE PAGE -->
<div id="messagePage" class="hidden">
    <h1>🎉 Happy Birthday Sakshi 🎉</h1>
    <p>Keep smiling 😊 Stay healthy ❤️<br>Take care 💖</p>
</div>

<audio id="music" src="music.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
